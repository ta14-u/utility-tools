name: Create Release Pull Request
on:
  push:
    branches: [develop]
jobs:
  release-pull-request:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create a release pull request
        uses: bakunyo/git-pr-release-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_PR_RELEASE_BRANCH_PRODUCTION: main # リリース先となるブランチ名
          GIT_PR_RELEASE_BRANCH_STAGING: develop # feature ブランチマージ先のブランチ名
          GIT_PR_RELEASE_LABELS: release
          GIT_PR_RELEASE_TEMPLATE: .github/templates/git_pr_release_template.erb
        with:
          args: '--squashed'
